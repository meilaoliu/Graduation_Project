# Global costmap: uses static map from map_server + real-time obstacle layer
global_costmap:
  global_frame: map
  robot_base_frame: sensor
  update_frequency: 2.0
  publish_frequency: 1.0
  static_map: true

  plugins:
    - {name: static_layer, type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  static_layer:
    enabled: true
    map_topic: /map

  obstacle_layer:
    enabled: true
    observation_sources: registered_scan
    registered_scan:
      topic: /registered_scan
      data_type: PointCloud2
      sensor_frame: sensor
      marking: true
      clearing: true
      obstacle_range: 5.0
      raytrace_range: 6.0
      min_obstacle_height: 0.10
      max_obstacle_height: 2.00

  inflation_layer:
    enabled: true
    inflation_radius: 0.55
    cost_scaling_factor: 5.0
