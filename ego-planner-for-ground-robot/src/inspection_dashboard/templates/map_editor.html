<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>OSM 地图编辑器</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='map_editor.css') }}" />
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body class="editor-page">
<header>
  <h1>🗺️ OSM 拓扑地图编辑器</h1>
  <nav class="nav-links">
    <a href="/" class="btn-link">← 返回仪表盘</a>
  </nav>
  <span id="osm-path" class="badge ok">未加载</span>
</header>

<div id="map-toolbar">
  <button data-act="reload">↺ 重新加载</button>
  <button data-act="add-node">+ 添加节点 (中心)</button>
  <button data-act="add-here">+ 用机器人当前位置添加</button>
  <button data-act="add-edge" id="btn-add-edge">— 添加边 (依次点两个节点)</button>
  <button data-act="delete" id="btn-delete">🗑 删除选中</button>
  <button data-act="fit">⤢ 适应窗口</button>
  <button data-act="rotate" title="顺时针旋转视图 90°">⟳ 旋转 90°</button>
  <button data-act="save" class="primary">💾 保存到 OSM 文件</button>
  <span id="status-msg"></span>
</div>

<main id="map-main">
  <div id="canvas-wrap">
    <svg id="map-svg" xmlns="http://www.w3.org/2000/svg">
      <g id="grid-layer"></g>
      <g id="edge-layer"></g>
      <g id="node-layer"></g>
      <g id="robot-layer"></g>
    </svg>
    <div id="hint">
      左键拖动节点 · 右键拖动平移 · 滚轮缩放 · 单击节点/边选中
    </div>
  </div>

  <aside id="side-panel">
    <h2>选中项属性</h2>
    <div id="empty-msg">未选中任何节点或边。</div>

    <form id="node-form" style="display:none">
      <label>ID <input id="nf-id" disabled /></label>
      <label>名称 <input id="nf-name" required /></label>
      <label>X (lon) <input id="nf-x" type="number" step="0.01" /></label>
      <label>Y (lat) <input id="nf-y" type="number" step="0.01" /></label>
      <fieldset>
        <legend>标签 (k=v)</legend>
        <div id="nf-tags"></div>
        <button type="button" id="nf-add-tag">+ 新增标签</button>
      </fieldset>
      <button type="submit" class="primary">应用修改</button>
    </form>

    <form id="edge-form" style="display:none">
      <label>ID <input id="ef-id" disabled /></label>
      <label>起点 <input id="ef-a" disabled /></label>
      <label>终点 <input id="ef-b" disabled /></label>
      <label>名称 <input id="ef-name" /></label>
      <button type="submit" class="primary">应用修改</button>
    </form>
  </aside>
</main>

<script src="{{ url_for('static', filename='map_editor.js') }}"></script>
</body>
</html>
