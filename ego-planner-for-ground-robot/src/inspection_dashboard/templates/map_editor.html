<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>OSM 地图编辑器</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='map_editor.css') }}" />
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body class="editor-page">
<header>
  <h1>🗺️ OSM 拓扑地图编辑器</h1>
  <nav class="nav-links">
    <a href="/" class="btn-link">← 返回仪表盘</a>
  </nav>
  <span id="osm-path" class="badge ok">未加载</span>
</header>

<div id="map-toolbar">
  <button data-act="reload">↺ 重新加载</button>
  <button data-act="add-node">+ 添加节点 (中心)</button>
  <button data-act="add-here">+ 用机器人当前位置添加</button>
  <button data-act="add-edge" id="btn-add-edge">— 添加边 (依次点两个节点)</button>
  <button data-act="delete" id="btn-delete">🗑 删除选中</button>
  <button data-act="undo" id="btn-undo" disabled>↶ 撤销</button>
  <button data-act="redo" id="btn-redo" disabled>↷ 恢复</button>
  <button data-act="fit">⤢ 适应窗口</button>
  <button data-act="rotate" title="顺时针旋转视图 90°">⟳ 旋转 90°</button>
  <button data-act="save" class="primary">💾 保存到 OSM 文件</button>
  <span id="status-msg"></span>
</div>

<main id="map-main">
  <div id="canvas-wrap">
    <svg id="map-svg" xmlns="http://www.w3.org/2000/svg">
      <g id="basemap-layer"></g>
      <g id="grid-layer"></g>
      <g id="edge-layer"></g>
      <g id="node-layer"></g>
      <g id="robot-layer"></g>
    </svg>
    <div id="hint">
      左键拖动节点 · 右键拖动平移 · 滚轮缩放 · 单击节点/边选中
    </div>
  </div>

  <aside id="side-panel">
    <h2>选中项属性</h2>
    <div id="empty-msg">未选中任何节点或边。</div>

    <form id="node-form" style="display:none">
      <label>ID <input id="nf-id" disabled /></label>
      <label>名称 <input id="nf-name" required /></label>
      <label>X (lon) <input id="nf-x" type="number" step="0.01" /></label>
      <label>Y (lat) <input id="nf-y" type="number" step="0.01" /></label>
      <label>设备类型 / device_type <input id="nf-device-type" placeholder="waypoint / svg / transformer ..." /></label>
      <label>角色 / role
        <select id="nf-role">
          <option value="">未设置</option>
          <option value="entry">entry 起点/入口</option>
          <option value="transit">transit 中间通行点</option>
          <option value="inspection_target">inspection_target 巡检目标</option>
          <option value="charge_point">charge_point 充电点</option>
        </select>
      </label>
      <label>粗略方位 / area <input id="nf-area" placeholder="east / center / west" /></label>
      <label>业务区域 / zone <input id="nf-zone" placeholder="如 SVG无功补偿区 / 35kV配电区" /></label>
      <label>描述 / description <textarea id="nf-description" rows="3" placeholder="给大模型看的自然语言说明；插值点可留空"></textarea></label>
      <fieldset>
        <legend>其他标签 (k=v)</legend>
        <div id="nf-tags"></div>
        <button type="button" id="nf-add-tag">+ 新增标签</button>
      </fieldset>
      <button type="submit" class="primary">应用修改</button>
      <button type="button" id="nf-delete" class="danger">删除此节点</button>
    </form>

    <form id="edge-form" style="display:none">
      <label>ID <input id="ef-id" disabled /></label>
      <label>起点 <input id="ef-a" disabled /></label>
      <label>终点 <input id="ef-b" disabled /></label>
      <p class="hint-text">边只表示拓扑连通关系，不编辑语义属性；保存时名称自动由两端节点生成。</p>
      <button type="button" id="ef-delete" class="danger">删除此边</button>
    </form>

    <details id="basemap-section">
      <summary>🗺️ 底图（俯视图对齐）</summary>
      <div class="basemap-body">
        <label class="row"><input type="checkbox" id="bm-enabled" /> 启用底图</label>
        <label>来源
          <select id="bm-source">
            <option value="local">本地图片</option>
            <option value="url">在线 URL</option>
          </select>
        </label>
        <label id="bm-local-row">本地文件
          <select id="bm-file"></select>
        </label>
        <label id="bm-url-row" style="display:none">URL
          <input id="bm-url" type="text" placeholder="https://..." />
        </label>
        <label class="row">
          <input type="file" id="bm-upload-input" accept="image/*" style="display:none" />
          <button type="button" id="bm-upload-btn">📤 上传本地图片…</button>
        </label>
        <label>中心 X <input id="bm-cx" type="number" step="0.1" /></label>
        <label>中心 Y <input id="bm-cy" type="number" step="0.1" /></label>
        <label>世界宽度 (m) <input id="bm-w" type="number" step="0.5" min="1" /></label>
        <label>旋转 (°) <input id="bm-rot" type="number" step="1" /></label>
        <label>不透明度 <input id="bm-op" type="range" min="0" max="1" step="0.05" /></label>
        <label class="row"><input type="checkbox" id="bm-drag" /> 拖动模式（左键拖动底图）</label>
        <div class="row" style="gap:6px; flex-wrap:wrap">
          <button type="button" id="bm-restore" title="恢复到上次保存的位置/缩放">↺ 恢复已保存配置</button>
          <button type="button" id="bm-fit" title="把底图粗略放在节点 bbox 中央，方便首次找到它">📍 粗对齐到节点中心</button>
        </div>
        <div class="row" style="gap:6px">
          <button type="button" id="bm-save" class="primary">💾 保存底图配置</button>
        </div>
      </div>
    </details>

    <details id="archive-section">
      <summary>🗂️ 拓扑历史存档</summary>
      <div class="archive-body">
        <p class="hint-text">每次保存 OSM 时自动备份。最多保留 30 份。</p>
        <button type="button" id="ar-refresh">↻ 刷新列表</button>
        <ul id="ar-list"></ul>
      </div>
    </details>
  </aside>
</main>

<script src="{{ url_for('static', filename='map_editor.js') }}"></script>
</body>
</html>
