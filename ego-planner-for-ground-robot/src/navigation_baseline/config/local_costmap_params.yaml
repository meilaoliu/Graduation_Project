# Local costmap: rolling window around the robot for local planning
local_costmap:
  global_frame: map
  robot_base_frame: sensor
  update_frequency: 5.0
  publish_frequency: 2.0
  static_map: false
  rolling_window: true
  width: 8.0
  height: 8.0
  resolution: 0.05

  plugins:
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  obstacle_layer:
    enabled: true
    observation_sources: registered_scan
    registered_scan:
      topic: /registered_scan
      data_type: PointCloud2
      sensor_frame: sensor
      marking: true
      clearing: true
      obstacle_range: 4.0
      raytrace_range: 5.0
      min_obstacle_height: 0.10
      max_obstacle_height: 2.00

  inflation_layer:
    enabled: true
    inflation_radius: 0.45
    cost_scaling_factor: 5.0
